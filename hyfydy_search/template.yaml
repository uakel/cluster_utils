# Training config template for the cost-limit hyperparameter search.
# train_for_search.py loads this file and overrides:
#   - tonic.environment  (picks sconerun_{h0918,h1622,h2190}_cat-v0 per job)
#   - tonic.name         (set to the cluster_utils job id)
#   - env_args cost coefficients and constraint limits (from cluster_utils params)
#   - env_args target_lumbar_torque (resolved from trunk + offset, env-dependent)
# All other fields are passed through unchanged.

tonic:
  after_training: ''
  header:
    import deprl, gym, sconegym
  agent:
    deprl.custom_agents.dep_factory(
      3,
      deprl.custom_mpo_torch.TunedMPO()
    )(
      replay=deprl.custom_replay_buffers.ExpModelBuffer(
        return_steps=1,
        batch_size=256,
        steps_between_batches=1000,
        batch_iterations=30,
        steps_before_batches=2e5,
        num_acts=__NUM_ACTS__
      )
    )
  before_training: ''
  checkpoint: "last"
  environment:
    deprl.environments.Gym(
      'sconerun_h0918_cat-v0',
      scaled_actions=False
    )
  full_save: 1
  name: "hyfydy_search_job"
  resume: false
  seed: 0
  parallel: 20
  sequential: 10
  test_environment: null
  trainer:
    deprl.custom_trainer.Trainer(
      steps=int(5e7),
      epoch_steps=int(2e5),
      save_steps=int(1e6)
    )

working_dir: "IGNORED_FOR_HYFYDY"

env_args:
  clip_actions: true
  step_size: 0.025
  init_activations_mean: 0.01
  init_activations_std: 0

  # Cost coefficients (overridden per job)
  min_velocity_cost_coeff: 1.0
  max_velocity_cost_coeff: 0.0
  grf_cost_coeff: 1.0
  nmuscle_cost_coeff: 0.0
  hip_limit_cost_coeff: 1.0
  knee_limit_cost_coeff: 1.0
  ankle_limit_cost_coeff: 1.0
  lumbar_limit_cost_coeff: 1.0
  smooth_cost_coeff: 0.0

  # Constraint limits (overridden per job)
  target_grf: 1.4
  target_delta: 0.1
  target_muscle_usage_percentage: 0.33
  target_hip_torque: 80
  target_knee_torque: 80
  target_ankle_torque: 80
  target_lumbar_torque: 80

mpo_args:
  hidden_size: 1024
  lr_actor: 3.53e-05
  lr_critic: 6.081e-05
  lr_dual: 0.00213

DEP:
  bias_rate: 0.002
  buffer_size: 200
  intervention_length: 8
  intervention_proba: 0.00371
  kappa: 1000
  normalization: "independent"
  q_norm_selector: "l2"
  regularization: 32
  s4avg: 2
  sensor_delay: 1
  tau: 40
  test_episode_every: 3
  time_dist: 5
  with_learning: true
